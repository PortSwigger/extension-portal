name: Trigger review workflow
description: >-
  Generate a scoped token for extension-portal-internal and dispatch the
  sanitize-and-analyze review workflow for a submission or update.

inputs:
  app_id:
    description: GitHub App ID with access to extension-portal-internal.
    required: true
  private_key:
    description: GitHub App private key.
    required: true
  extension_name:
    description: BApp Store name of the extension.
    required: true
  target_repo_url:
    description: Repository to review - the extension repo for submissions, the pull request URL for updates.
    required: true
  jira_ticket:
    description: Jira ticket key to record the review against.
    required: true
  issue_url:
    description: Link to the originating GitHub issue.
    required: true
  compatible_products:
    description: Comma-separated product compatibility list (submissions only).
    required: false
    default: ''
  is_update:
    description: Whether this review is for an extension update.
    required: false
    default: 'false'

runs:
  using: composite
  steps:
    - name: Generate GitHub App token
      id: generate_token
      uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
      with:
        app-id: ${{ inputs.app_id }}
        private-key: ${{ inputs.private_key }}
        repositories: extension-portal-internal

    - name: Dispatch review workflow
      shell: bash
      env:
        OWNER: PortSwigger
        REPO: extension-portal-internal
        WORKFLOW_FILE: sanitize-and-analyze.yml
        REF: main
        GH_TOKEN: ${{ steps.generate_token.outputs.token }}
        EXTENSION_NAME: ${{ inputs.extension_name }}
        TARGET_REPO_URL: ${{ inputs.target_repo_url }}
        COMPATIBLE_PRODUCTS: ${{ inputs.compatible_products }}
        JIRA_TICKET: ${{ inputs.jira_ticket }}
        ISSUE_URL: ${{ inputs.issue_url }}
        IS_UPDATE: ${{ inputs.is_update }}
      run: |
        # Build JSON payload using jq to safely escape all values
        payload=$(jq -n \
          --arg ref "$REF" \
          --arg extension_name "$EXTENSION_NAME" \
          --arg target_repo_url "$TARGET_REPO_URL" \
          --arg compatible_products "$COMPATIBLE_PRODUCTS" \
          --arg jira_ticket "$JIRA_TICKET" \
          --arg issue_url "$ISSUE_URL" \
          --arg is_update "$IS_UPDATE" \
          '{"ref": $ref, "inputs": {"extension_name": $extension_name, "target_repo_url": $target_repo_url, "compatible_products": $compatible_products, "jira_ticket": $jira_ticket, "issue_url": $issue_url, "is_update": $is_update}}')

        curl -sS -f -X POST \
          -H "Accept: application/vnd.github+json" \
          -H "Authorization: Bearer $GH_TOKEN" \
          -H "Content-Type: application/json" \
          https://api.github.com/repos/$OWNER/$REPO/actions/workflows/$WORKFLOW_FILE/dispatches \
          -d "$payload"

        echo "Workflow dispatch triggered successfully"
